name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint every shell script in bin/ — BLOCKING (warnings cleared in #54). Catches
  # the incident class directly: quoting, unset vars, pipefail, the BSD-awk silent
  # no-op. -S warning is the threshold; SC1091 (don't follow the sourced _lib.sh)
  # is the one project-wide exception. A new warning fails CI — fix it, or add a
  # scoped `# shellcheck disable=SCxxxx` with a one-line reason.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -e SC1091 -S warning bin/backlog-agent bin/_lib.sh bin/backlog-agents bin/backlog-secret-scan bin/backlog-snapshot.sh bin/dev-projects

  # Behavioral tests run on macOS — the driver uses BSD-isms (sed -i '',
  # date -r) and is macOS-targeted (the fleet runs on Macs).
  bats:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install bats-core
      - run: bats test/*.bats
